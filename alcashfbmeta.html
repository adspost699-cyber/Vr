<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GIF Fetch Same Time</title>
    <!-- Static fallback for FB -->
    <meta property="og:image" content="https://pub-5198cbdd4b1c4950ada79e22a5fa4052.r2.dev/488724154_665607592822205_2574941374612882759_n.gif" />
</head>
<body>

    <div id="gif-container"></div>

    <script>
        // Get current timestamp for live fetching
        var currentTime = new Date().getTime();
        var gifUrl = "https://pub-5198cbdd4b1c4950ada79e22a5fa4052.r2.dev/488724154_665607592822205_2574941374612882759_n.gif" + currentTime;

        // Creating and appending the live image
        var img = document.createElement('img');
        img.src = gifUrl;
        img.style.width = "100%";
        img.style.maxWidth = "600px";

        document.getElementById('gif-container').appendChild(img);
    </script>
</body>
</html>
